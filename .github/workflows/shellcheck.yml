name: ShellCheck

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    name: ShellCheck Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './src'
          severity: warning

      - name: Run ShellCheck on tests
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './tests'
          severity: error

      - name: Run ShellCheck on install scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          additional_files: 'install.sh uninstall.sh'
          severity: warning
